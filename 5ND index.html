<h1>學習心得</h1>
<p>本次作業透過製作高雄地標網站，讓我更深入了解在地建築的設計巧思。從衛武營的流線形體、高雄流行音樂中心的港灣意象，到圖書總館的懸吊式構造，這些案例都對我未來的建築設計思路有很大啟發。</p>
<h2>感悟</h2>
<ul>
    <li><strong>設計與環境：</strong>建築不僅僅是建築物本身，它如何回應在地的環境是成功的關鍵。</li>
    <li><strong>構造與功能：</strong>透過這些現代地標，我體會到創新的構造系統能極大化地改善空間的使用效率。</li>
    <li><strong>網站製作：</strong>第一次嘗試將建築作品集以網頁形式呈現，這對未來的設計展示很有幫助。</li>
</ul>
