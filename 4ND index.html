<h1>高雄市立圖書館總館</h1>
<p>這是一座懸吊式鋼構建築，玻璃帷幕設計讓室內空間與自然光線完美融合，被譽為全球最美的圖書館之一，也是高雄的地標級公共空間。</p>
<h2>建築特色</h2>
<ul>
    <li><strong>懸吊系統：</strong>減去了柱子的限制，創造出更開闊的閱讀空間。</li>
    <li><strong>生態景觀：</strong>頂樓空中花園設計，有效降低室內溫度並提供都市綠意。</li>
    <li><strong>透明與穿透：</strong>大量的玻璃運用，使室內讀者能與周邊都市景觀互動。</li>
</ul>
