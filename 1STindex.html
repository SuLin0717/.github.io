<h1>衛武營國家藝術文化中心</h1>
<p>衛武營是全球最大單一屋頂劇院，設計概念源自周邊的榕樹群，流線型的白色建築體宛如太空船降落在高雄，模糊了室內與戶外的界線。</p>
<h2>建築特色</h2>
<ul>
    <li><strong>曲面設計：</strong>大量運用雙曲面鋼構，挑戰施工難度。</li>
    <li><strong>榕樹廣場：</strong>開放式空間設計，讓民眾能自由穿梭，連結社區與藝術。</li>
    <li><strong>聲學品質：</strong>擁有多個專業表演廳，達到國際級聲學標準。</li>
</ul>
